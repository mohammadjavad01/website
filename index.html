<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>یه آهنگمون نشه؟</title>
  <!-- لینک Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #f0f2f5;
      font-family: Tahoma, Geneva, Verdana, sans-serif;
    }
    header {
      background: linear-gradient(135deg, #4b6cb7, #182848);
      color: #fff;
      padding: 30px 0;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 2.5rem;
    }
    .music-section {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }
    .music-card {
      background-color: #fff;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      padding: 20px;
      margin-bottom: 30px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .music-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .music-title {
      font-size: 1.5rem;
      margin-bottom: 15px;
      color: #333;
    }
    footer {
      background-color: #222;
      color: #ccc;
      padding: 20px 0;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>سایت موزیک</h1>
</header>

<section class="music-section">
  <!-- آهنگ 1 -->
  <div class="music-card">
    <div class="music-title">آهنگ ۱</div>
    <audio controls style="width: 100%; border-radius: 10px;">
      <source src="music1.mp3" type="audio/mpeg" />
      مرورگر شما از پخش صوت پشتیبانی نمی‌کند.
    </audio>
  </div>
  <!-- آهنگ 2 -->
  <div class="music-card">
    <div class="music-title">آهنگ ۲</div>
    <audio controls style="width: 100%; border-radius: 10px;">
      <source src="music2.mp3" type="audio/mpeg" />
      مرورگر شما از پخش صوت پشتیبانی نمی‌کند.
    </audio>
  </div>
  <!-- آهنگ 3 -->
  <div class="music-card">
    <div class="music-title">آهنگ ۳</div>
    <audio controls style="width: 100%; border-radius: 10px;">
      <source src="music3.mp3" type="audio/mpeg" />
      مرورگر شما از پخش صوت پشتیبانی نمی‌کند.
    </audio>
  </div>
  <!-- می‌تونی هر تعداد آهنگ دیگه اضافه کنی -->
</section>

<footer>
  <p>تمام حقوق محفوظ است &copy; 2024</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
